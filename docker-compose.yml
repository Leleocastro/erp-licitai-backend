version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-licitai-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-erp_licitai}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-erp_licitai}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - erp-licitai-net

  redis:
    image: redis:7-alpine
    container_name: erp-licitai-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - erp-licitai-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: erp-licitai-app
    environment:
      NODE_ENV: development
      APP_PORT: ${APP_PORT:-3000}
      APP_PREFIX: ${APP_PREFIX:-api}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-erp_licitai}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-jwt-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      TYPEORM_SYNCHRONIZE: ${TYPEORM_SYNCHRONIZE:-false}
    ports:
      - "${HOST_APP_PORT:-3000}:${APP_PORT:-3000}"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-licitai-net

volumes:
  postgres_data:
  redis_data:

networks:
  erp-licitai-net:
    driver: bridge
